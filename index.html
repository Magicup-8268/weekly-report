<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주간업무보고서</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');
        :root {
            --accent-color: #1E40AF;
            --accent-color-light: #DBEAFE;
            --accent-color-start: #1E40AF;
            --accent-color-end: #3B82F6;
            --header-bg-image: none;
            --header-bg-position: center center;
            --header-bg-size: 40% auto;
            --header-bg-opacity: 0.15;
            --header-mix-blend-mode: soft-light;
        }
        * { font-family: 'Noto Sans KR', sans-serif; }
        .material-section {
            break-inside: avoid;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background-color: #ffffff;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        .gradient-header-bg {
            background: linear-gradient(135deg, var(--accent-color-start) 0%, var(--accent-color-end) 100%);
            padding: 2.5rem;
            border-radius: 1rem;
            color: white;
            position: relative;
            overflow: hidden;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        .gradient-header-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--header-bg-image);
            background-repeat: no-repeat;
            background-position: var(--header-bg-position);
            background-size: var(--header-bg-size);
            opacity: var(--header-bg-opacity);
            z-index: 1;
            mix-blend-mode: var(--header-mix-blend-mode);
        }
        .gradient-header-bg h1, .gradient-header-bg p { position: relative; z-index: 2; }
        .section-heading, .document-output h2, .document-output h3 {
            font-family: 'Playfair Display', serif !important;
            font-weight: 700 !important;
            color: #1F2937 !important;
            display: flex;
            align-items: center;
        }
        .section-heading {
            border-bottom: 3px solid var(--accent-color-light);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .section-heading i { margin-right: 0.75rem; color: var(--accent-color); }
        .accent-border {
            border-left: 5px solid var(--accent-color);
            padding-left: 1rem;
            background-color: #F8FAFC;
        }

        /* 머리글/바닥글 제거 및 상단 여백 최적화 */
        @page {
            margin: 0; 
        }

        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { 
                /* 상단 여백 최소화 (0.5cm) */
                padding: 0.5cm 1.5cm 1.5cm 1.5cm !important; 
                font-size: 11pt; 
                line-height: 1.6; 
                background-color: transparent !important; 
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .material-section {
                box-shadow: none !important;
                border: 1px solid #e5e7eb !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .gradient-header-bg {
                background: linear-gradient(135deg, var(--accent-color-start) 0%, var(--accent-color-end) 100%) !important;
                mix-blend-mode: normal !important;
            }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-2 max-w-7xl">
        <div class="text-center mb-8 no-print">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">
                <i class="fas fa-tasks text-blue-700 mr-3"></i> 주간 업무 보고서
            </h1>
            <p class="text-gray-600 text-lg">주간 업무 보고서 전문 양식입니다</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white rounded-lg shadow-lg p-6 no-print">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <i class="fas fa-edit text-blue-500 mr-2"></i> 정보 입력
                </h2>
                <form id="documentForm" class="space-y-6" onsubmit="return false;">
                    <div class="border-b border-gray-200 pb-6">
                        <h3 class="section-heading"><i class="fas fa-info-circle"></i> 기본 정보</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="input-group">
                                <label class="block text-sm font-medium text-gray-700 mb-2">보고서 제목</label>
                                <input type="text" id="documentTitle" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="예: 3월 2주차 업무 보고">
                            </div>
                            <div class="input-group">
                                <label class="block text-sm font-medium text-gray-700 mb-2">작성자/부서</label>
                                <input type="text" id="authorInfo" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="예: 홍길동 대리 (마케팅팀)">
                            </div>
                        </div>
                        <div class="input-group mt-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">보고 일자</label>
                            <input type="date" id="releaseDate" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <div class="border-b border-gray-200 pb-6">
                        <h3 class="section-heading"><i class="fas fa-check-circle"></i> 금주 업무 계획</h3>
                        <textarea id="thisWeekResult" rows="5" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="• 내용 입력..."></textarea>
                    </div>

                    <div class="border-b border-gray-200 pb-6">
                        <h3 class="section-heading"><i class="fas fa-calendar-alt"></i> 차주 업무 계획</h3>
                        <textarea id="nextWeekPlan" rows="5" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="• 내용 입력..."></textarea>
                    </div>

                    <div class="pb-6">
                        <h3 class="section-heading"><i class="fas fa-exclamation-triangle"></i> 이슈 및 건의사항</h3>
                        <textarea id="issues" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="• 특이사항 입력..."></textarea>
                    </div>

                    <div class="flex flex-col space-y-3">
                        <button type="button" onclick="generateDocument()" class="w-full bg-blue-700 text-white py-3 rounded-md hover:bg-blue-800 font-semibold transition">
                            <i class="fas fa-sync-alt mr-2"></i> 보고서 업데이트
                        </button>
                        <div class="grid grid-cols-2 gap-2">
                            <button type="button" id="saveFileButton" class="bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600 text-sm transition">
                                <i class="fas fa-download mr-1"></i> 데이터 저장
                            </button>
                            <label class="bg-gray-500 text-white py-2 rounded-md hover:bg-gray-600 text-sm text-center cursor-pointer transition">
                                <i class="fas fa-upload mr-1"></i> 데이터 불러오기
                                <input type="file" id="loadFile" accept=".json" class="hidden">
                            </label>
                        </div>
                        <button type="button" id="clearFormButton" class="text-gray-500 hover:text-red-500 text-sm underline transition">양식 초기화</button>
                    </div>
                </form>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-8">
                <div class="flex items-center justify-between mb-6 no-print">
                    <h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-file-signature text-green-600 mr-2"></i> 미리보기</h2>
                    <button id="printButton" class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 transition">
                        <i class="fas fa-print mr-2"></i> PDF 저장
                    </button>
                </div>
                <div id="documentPreview" class="document-output"></div>
            </div>
        </div>
    </div>

    <script>
        const formId = 'documentForm';
        const storageKey = 'form_generator_weekly_report';

        function saveData() {
            const formData = {};
            document.querySelectorAll(`#${formId} input, #${formId} textarea`).forEach(el => {
                if (el.id) formData[el.id] = el.value;
            });
            localStorage.setItem(storageKey, JSON.stringify(formData));
        }

        function loadData() {
            const saved = localStorage.getItem(storageKey);
            if (saved) {
                const data = JSON.parse(saved);
                for (const id in data) {
                    const el = document.getElementById(id);
                    if (el) el.value = data[id];
                }
            } else {
                document.getElementById('releaseDate').value = new Date().toISOString().slice(0, 10);
            }
            generateDocument();
        }

        function generateDocument() {
            const title = document.getElementById('documentTitle').value || '업무 주간 보고서';
            const author = document.getElementById('authorInfo').value || '성함 / 부서명';
            const date = document.getElementById('releaseDate').value;
            const thisWeek = document.getElementById('thisWeekResult').value || '금주 실적을 입력하세요.';
            const nextWeek = document.getElementById('nextWeekPlan').value || '차주 계획을 입력하세요.';
            const issues = document.getElementById('issues').value || '특이사항 없음';

            const formattedIssues = issues.split('\n').join('<br>');

            let html = `
                <div class="fade-in">
                    <div class="gradient-header-bg text-center mb-8">
                        <h1 class="text-4xl font-bold mb-2">${title}</h1>
                        <p class="text-lg opacity-90">${author}</p>
                        <p class="text-sm mt-4 opacity-75">보고일: ${date ? new Date(date).toLocaleDateString('ko-KR') : '-'}</p>
                    </div>
                    <div class="material-section">
                        <h3 class="section-heading"><i class="fas fa-check-double"></i> 금주 업무 계획</h3>
                        <div class="accent-border py-2 whitespace-pre-wrap text-gray-700">${thisWeek}</div>
                    </div>
                    <div class="material-section">
                        <h3 class="section-heading"><i class="fas fa-rocket"></i> 차주 업무 계획</h3>
                        <div class="accent-border py-2 whitespace-pre-wrap text-gray-700">${nextWeek}</div>
                    </div>
                    <div class="material-section">
                        <h3 class="section-heading"><i class="fas fa-lightbulb"></i> 이슈 및 특이사항</h3>
                        <p class="text-gray-700 italic">${formattedIssues}</p>
                    </div>
                    <div class="text-center text-gray-400 text-xs mt-12 print-only">
                        <p>본 문서는 ${new Date().toLocaleDateString('ko-KR')}에 생성되었습니다.</p>
                    </div>
                </div>
            `;
            document.getElementById('documentPreview').innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            
            document.querySelectorAll(`#${formId} input, #${formId} textarea`).forEach(el => {
                el.addEventListener('input', () => {
                    saveData();
                    generateDocument();
                });
            });

            // 모바일 인쇄 최적화 버튼 이벤트
            document.getElementById('printButton').addEventListener('click', () => {
                window.print();
            });

            document.getElementById('saveFileButton').addEventListener('click', () => {
                const data = localStorage.getItem(storageKey);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `주간보고_${new Date().toISOString().slice(0,10)}.json`;
                a.click();
            });

            document.getElementById('loadFile').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    localStorage.setItem(storageKey, ev.target.result);
                    loadData();
                };
                reader.readAsText(file);
            });

            document.getElementById('clearFormButton').addEventListener('click', () => {
                if(confirm('모든 내용을 삭제할까요?')) {
                    localStorage.removeItem(storageKey);
                    location.reload();
                }
            });
        });
    </script>
</body>
</html>
